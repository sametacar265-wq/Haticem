<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haticem ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffdeeb;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kalp Yağmuru Arka Planı */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: #ff4d7d;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Kart Konteyneri */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .header-title {
            font-size: 32px;
            color: #d81b60;
            margin-bottom: 15px;
        }

        .poem-content {
            font-size: 18px;
            line-height: 1.8;
            color: #4f4f4f;
            font-style: italic;
            margin: 25px 0;
            white-space: pre-line;
        }

        .floating-heart-btn {
            display: inline-block;
            margin-top: 15px;
            font-size: 40px;
            animation: pulse 1.5s infinite;
            cursor: pointer;
            user-select: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts-container"></div>

    <div class="container">
        <h1 class="header-title">Hatice'me ❤️</h1>
        <div class="poem-content">
            Gökyüzü olsam, yine seni izlerdim,
            Bir şiir olsam, sadece seni söylerdim.
            Dünyanın en güzel kalbine sahip insan,
            İyi ki varsın, iyi ki hayatımdasın...
        </div>
        <!-- Bu kalbe tıkladıkça ekstradan havai fişek gibi kalpler fırlayacak -->
        <div class="floating-heart-btn" onclick="extraHearts()">💝</div>
    </div>

    <script>
        // Arka Plandaki Kalp Yağmuru Efekti
        function createHeart() {
            const container = document.getElementById('hearts-container');
            if (!container) return;
            
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Sürekli kalp yağdır
        setInterval(createHeart, 400);

        // Butona tıklandığında ekstra kalpler fırlatma fonksiyonu
        function extraHearts() {
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 100);
            }
        }
    </script>
</body>
</html>
