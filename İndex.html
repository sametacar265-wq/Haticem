<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haticem ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffdeeb;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kalp Yağmuru Arka Planı */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: #ff4d7d;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Kart Konteyneri */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Şifre Ekranı Tasarımı */
        #auth-screen h2 {
            color: #d81b60;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffb3d1;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            text-align: center;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            border-color: #d81b60;
            box-shadow: 0 0 8px rgba(216, 27, 96, 0.3);
        }

        button {
            background: linear-gradient(45deg, #ff4d7d, #d81b60);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(216, 27, 96, 0.6);
        }

        .error-msg {
            color: #e53935;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* Ana İçerik (Şiir Sayfası) */
        #main-app {
            display: none;
        }

        .header-title {
            font-size: 32px;
            color: #d81b60;
            margin-bottom: 15px;
        }

        .poem-content {
            font-size: 18px;
            line-height: 1.8;
            color: #4f4f4f;
            font-style: italic;
            margin: 25px 0;
            white-space: pre-line;
        }

        .floating-heart-btn {
            display: inline-block;
            margin-top: 15px;
            font-size: 30px;
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts-container"></div>

    <div class="container">
        <!-- Giriş Ekranı -->
        <div id="auth-screen">
            <h2>Giriş Şifresi ❤️</h2>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Şifrenizi girin..." onkeypress="handleKeyPress(event)">
            </div>
            <button onclick="checkPassword()">Giriş Yap</button>
            <div class="error-msg" id="error-message">Hatalı şifre, lütfen tekrar deneyin.</div>
        </div>

        <!-- Şiir Ekranı (İlk başta gizli) -->
        <div id="main-app">
            <h1 class="header-title">Hatice'me ❤️</h1>
            <div class="poem-content" id="poem-text">
                Gökyüzü olsam, yine seni izlerdim,
                Bir şiir olsam, sadece seni söylerdim.
                Dünyanın en güzel kalbine sahip insan,
                İyi ki varsın, iyi ki hayatımdasın...
            </div>
            <div class="floating-heart-btn" onclick="extraHearts()">💝</div>
        </div>
    </div>

    <script>
        // Arka Plandaki Kalp Yağmuru Efekti
        function createHeart() {
            const container = document.getElementById('hearts-container');
            if (!container) return;
            
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Sürekli kalp yağdır
        setInterval(createHeart, 400);

        // Enter tuşu ile giriş yapabilme
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }

        // Şifre Kontrol Fonksiyonu
        function checkPassword() {
            const passwordInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-message');
            
            // Buraya istediğin şifreyi yazabilirsin (Şu an örnek olarak: hatice123)
            if (passwordInput === 'hatice123') {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                errorMsg.style.display = 'block';
                // Giriş kutusunu temizle ve odağı tekrar oraya ver
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
            }
        }

        // Butona tıklandığında ekstra kalpler fırlatma fonksiyonu
        function extraHearts() {
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 100);
            }
        }
    </script>
</body>
</html>
